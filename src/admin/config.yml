backend:
  name: git-gateway
  branch: main

# LOCAL DEVELOPMENT: 
# Set true for local dev (writes to disk via npm run cms)
# Set false for production (Netlify Identity)
local_backend: false

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "src/posts"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{slugify title}}"
    summary: "{{title}} — {{date}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Clear, keyword-rich title for the post"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "One-sentence summary for SEO and social previews"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Draft", value: "draft" }
          - { label: "Published", value: "published" }
        default: "draft"

      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "e.g. python, machine-learning, beginner"

      - label: "Estimated Reading Time"
        name: "estimatedTime"
        widget: "string"
        required: false
        hint: "e.g. '5 min read' or '2-3 hours'"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write your post content in Markdown"
        default: |
          ## Why this exists

          [Problem + who it helps + outcome]

          ## What you'll learn

          - Concrete outcome 1
          - Concrete outcome 2

          ## Before you start

          [Prerequisites with links]

          ## Setup

          ```bash
          pip install something
          ```

          ## Content

          Your content here...

          ## Summary

          [Key takeaways]

          ## Resources

          - [Resource 1](https://example.com)
          - [Resource 2](https://example.com)