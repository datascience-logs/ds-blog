<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Data Science Diaries</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* ── CSS Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A0F1C;
      --surface:  #111827;
      --card:     #1A2235;
      --border:   rgba(255,255,255,0.08);
      --accent:   #3B82F6;
      --accent-d: rgba(59,130,246,0.15);
      --text:     #E5E7EB;
      --muted:    #6B7280;
      --font:     'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--text); }

    /* ── Loading splash ───────────────────────────────── */
    #cms-loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #cms-loading.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-logo svg {
      width: 28px;
      height: 28px;
      color: #fff;
      stroke: currentColor;
    }

    .splash-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .splash-sub {
      font-size: 0.8125rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .splash-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Deep-override Decap CMS UI ───────────────────── */

    /* App shell background */
    #nc-root,
    [class*="App__"],
    [class*="AppBody"] {
      font-family: var(--font) !important;
      background: var(--bg) !important;
    }

    /* Top nav / header bar */
    [class*="AppHeader"],
    header[class*="Header"] {
      background: rgba(10,15,28,0.9) !important;
      backdrop-filter: blur(16px) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    /* Sidebar */
    [class*="Nav__"],
    [class*="Sidebar"],
    nav[class*="Nav"] {
      background: var(--surface) !important;
      border-right: 1px solid var(--border) !important;
    }

    /* Nav items */
    [class*="Nav__"] a,
    [class*="NavLink"] {
      color: #9CA3AF !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
      border-radius: 6px !important;
      transition: all 0.15s ease !important;
      --bg-main: #0B1220;
      --bg-surface: #111827;
      --bg-card: #1F2937;

      --text-primary: #E5E7EB;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;

      --accent: #3B82F6;
      --accent-hover: #2563EB;

      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;

      --border: rgba(255,255,255,0.06);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── 2. Base Reset & Visibility ───────────────────── */
    * { box-sizing: border-box; }

    body {
      background: var(--bg-main) !important;
      color: var(--text-primary) !important;
      font-family: var(--font) !important;
      font-size: 14px !important;
      line-height: 1.6 !important;
      margin: 0;
    }

    p, span, label { color: var(--text-secondary) !important; }
    h1, h2, h3, strong { color: var(--text-primary) !important; }

    /* ── 3. Layout Structure ─────────────────────────── */
    #nc-root [class*="AppContainer"] {
      display: grid !important;
      grid-template-columns: 240px 1fr !important;
      height: 100vh !important;
      background: var(--bg-main) !important;
    }

    /* ── 4. Sidebar Design ───────────────────────────── */
    [class*="SidebarContainer"] {
      background: var(--bg-surface) !important;
      border-right: 1px solid var(--border) !important;
      padding: 24px 16px !important;
      height: 100vh !important;
    }

    [class*="SidebarNavLink"] {
      padding: 10px 14px !important;
      border-radius: 8px !important;
      color: var(--text-secondary) !important;
      cursor: pointer !important;
      margin-bottom: 4px !important;
      transition: all 0.2s ease !important;
      display: block !important;
      text-decoration: none !important;
    }

    [class*="SidebarNavLink"]:hover {
      background: rgba(255,255,255,0.04) !important;
      color: var(--text-primary) !important;
    }

    [class*="SidebarNavLink"][class*="active"] {
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      font-weight: 600 !important;
    }

    /* ── 5. Main Content & Top Bar ──────────────────── */
    [class*="TopBarContainer"] {
      background: var(--bg-surface) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 0 32px !important;
    }

    /* ── 6. Collections & Cards ──────────────────────── */
    [class*="CollectionCard"],
    [class*="Card"] {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      padding: 20px !important;
      margin-bottom: 16px !important;
      color: var(--text-primary) !important;
    }

    /* ── 7. Posts Page / Table style ────────────────── */
    [class*="Table"] {
      width: 100% !important;
      border-collapse: collapse !important;
    }

    [class*="Table"] th {
      text-align: left !important;
      color: var(--text-muted) !important;
      padding: 12px !important;
      font-size: 12px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
    }

    [class*="Table"] td {
      padding: 16px 12px !important;
      border-top: 1px solid var(--border) !important;
      color: var(--text-secondary) !important;
    }

    [class*="TableRow"]:hover {
      background: rgba(255,255,255,0.03) !important;
    }

    /* ── 8. New Post Editor (Split Layout) ────────────── */
    [class*="EditorContainer"] {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 0 !important;
      height: calc(100vh - 64px) !important;
    }

    [class*="ControlPane"] {
      background: var(--bg-main) !important;
      padding: 40px !important;
      overflow-y: auto !important;
      border-right: 1px solid var(--border) !important;
    }

    [class*="PreviewPane"] {
      background: var(--bg-surface) !important;
      padding: 40px !important;
      overflow-y: auto !important;
    }

    /* Input Fields */
    input[type="text"],
    textarea,
    [class*="Input"],
    [contenteditable] {
      width: 100% !important;
      background: var(--bg-card) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border) !important;
      padding: 14px !important;
      border-radius: 8px !important;
      font-family: var(--font) !important;
      font-size: 14px !important;
      margin-top: 8px !important;
      outline: none !important;
    }

    input:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
    }

    /* Labels */
    label, [class*="Label"] {
      display: block !important;
      color: var(--text-secondary) !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
      margin-top: 24px !important;
    }

    /* ── 9. Buttons ─────────────────────────────────── */
    [class*="Button"] {
      background: var(--accent) !important;
    /* Search bar in collection list */
    [class*="SearchInput"],
    [class*="search-input"] {
      background: var(--card) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
      border-radius: 8px !important;
    }

    /* Tags / pills in list */
    [class*="Tag"],
    [class*="Badge"] {
      background: rgba(59,130,246,0.1) !important;
      color: #93C5FD !important;
      border: 1px solid rgba(59,130,246,0.2) !important;
      border-radius: 9999px !important;
      font-size: 0.75rem !important;
    }

    /* Scrollbar (Chrome/Edge) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- Branded loading splash -->
  <div id="cms-loading" role="status" aria-live="polite" aria-label="Loading CMS">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
    </div>
    <div style="text-align:center;display:flex;flex-direction:column;gap:4px;">
      <span class="splash-title">Data Science Diaries</span>
      <span class="splash-sub">Content Manager</span>
    </div>
    <div class="splash-spinner" aria-hidden="true"></div>
  </div>

  <!-- Decap CMS Root -->
  <div id="nc-root"></div>

  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>

  <script>
    // Hide the splash screen as soon as Decap CMS starts to render
    const hideSplash = () => {
      const splash = document.getElementById('cms-loading');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }
    };

    // Watch for the CMS root element to be populated
    const observer = new MutationObserver((mutations, obs) => {
      const root = document.getElementById('nc-root');
      if (root && root.children.length > 0) {
        hideSplash();
        obs.disconnect();
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    // Fallback
    window.addEventListener('load', () => setTimeout(hideSplash, 3000));
  </script>
</body>
</html>
