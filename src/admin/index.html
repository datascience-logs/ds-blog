<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidWriter Admin — Data Science Diaries</title>

  <!-- Google Fonts: Space Grotesk, Inter, JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- Material Symbols Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* ── 1. Global Reset & Variables ────────────────── */
    :root {
      --bg-main: #0C1321;
      --bg-surface: #111827;
      --bg-card: #19202E;
      --bg-input: #1F2937;
      --bg-body: #070E1C;
      
      --primary: #B6C4FF;
      --primary-dim: #90A8FF;
      --secondary: #FFB690;
      --secondary-hover: #EC6A06;
      
      --text-primary: #DCE2F6;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      
      --border: rgba(255,255,255,0.06);
      --font-body: 'Inter', system-ui, sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { 
      height: 100%; 
      background: var(--bg-main); 
      font-family: var(--font-body); 
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── 2. Premium Loading Splash ───────────────────── */
    #cms-loading {
      position: fixed;
      inset: 0;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #cms-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), #8B5CF6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(182, 196, 255, 0.2);
    }

    .splash-logo svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .splash-text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .splash-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .splash-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .splash-spinner {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .splash-spinner::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 50%;
      background: var(--primary);
      animation: load 1.5s infinite ease-in-out;
    }

    @keyframes load {
      0% { left: -50%; }
      100% { left: 100%; }
    }

    /* ── 3. Decap CMS UI Overrides (VoidWriter Pro) ────── */
    
    /* Global Backgrounds */
    #nc-root, 
    [class*="AppContainer"],
    [class*="AppBody"] {
      background: var(--bg-main) !important;
    }

    /* Side Sidebar (Collections List) */
    [class*="SidebarContainer"] {
      background: var(--bg-surface) !important;
      border-right: 1px solid var(--border) !important;
      padding: 32px 16px !important;
    }

    [class*="SidebarNavLink"] {
      padding: 12px 16px !important;
      border-radius: 10px !important;
      color: var(--text-secondary) !important;
      transition: all 0.2s ease !important;
      font-weight: 500 !important;
      margin-bottom: 4px !important;
    }

    [class*="SidebarNavLink"]:hover {
      background: rgba(255,255,255,0.04) !important;
      color: var(--text-primary) !important;
    }

    [class*="SidebarNavLink"][class*="active"] {
      background: var(--bg-card) !important;
      color: var(--primary) !important;
      font-weight: 700 !important;
    }

    /* Top Bar / VoidBar */
    [class*="TopBarContainer"] {
      background: rgba(11, 18, 32, 0.8) !important;
      backdrop-filter: blur(16px) !important;
      border-bottom: 1px solid var(--border) !important;
      height: 64px !important;
      padding: 0 24px !important;
      display: flex !important;
      align-items: center !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
    }

    /* ── 4. 3-Column Editor Layout ──────────────────── */
    
    [class*="EditorContainer"] {
      display: grid !important;
      grid-template-columns: 320px 1fr 500px !important;
      height: calc(100vh - 64px) !important;
      gap: 0 !important;
      background: var(--bg-main) !important;
    }

    /* LEFT: Metadata Panel (ControlPane Fields) */
    [class*="ControlPane"] {
      grid-column: 1 / 3 !important;
      display: grid !important;
      grid-template-columns: 320px 1fr !important;
      padding: 0 !important;
      background: transparent !important;
    }

    /* Side metadata column */
    [class*="ControlPane"] > div:not(:has([class*="Markdown"])) {
      grid-column: 1 !important;
      background: var(--bg-surface) !important;
      padding: 32px 24px !important;
      border-right: 1px solid var(--border) !important;
      height: 100% !important;
      overflow-y: auto !important;
    }

    /* Center markdown column */
    [class*="ControlPane"] > div:has([class*="Markdown"]) {
      grid-column: 2 !important;
      background: var(--bg-body) !important;
      padding: 40px !important;
      height: 100% !important;
      overflow-y: auto !important;
    }

    /* RIGHT: Preview Panel */
    [class*="PreviewPane"] {
      grid-column: 3 !important;
      background: var(--bg-main) !important;
      padding: 40px !important;
      border-left: 1px solid var(--border) !important;
      overflow-y: auto !important;
    }

    /* ── 5. Field & Input Styling ───────────────────── */
    
    [class*="ControlLabel"], label {
      font-family: var(--font-body) !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      color: var(--text-muted) !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      margin-bottom: 8px !important;
      display: block !important;
    }

    input[type="text"], 
    textarea, 
    [class*="Input"] {
      background: var(--bg-input) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      color: var(--text-primary) !important;
      padding: 14px 16px !important;
      font-size: 14px !important;
      transition: all 0.2s ease !important;
      width: 100% !important;
    }

    input:focus, textarea:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 2px rgba(182, 196, 255, 0.1) !important;
      outline: none !important;
    }

    /* Markdown Area Specifics */
    [class*="Markdown"] [class*="EditorControlBar"] {
      background: var(--bg-input) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px 10px 0 0 !important;
      padding: 8px !important;
    }

    [class*="Markdown"] [contenteditable] {
      font-family: var(--font-code) !important;
      font-size: 15px !important;
      line-height: 1.8 !important;
      color: var(--text-primary) !important;
      background: var(--bg-body) !important;
      padding: 32px !important;
      border: 1px solid var(--border) !important;
      border-top: none !important;
      border-radius: 0 0 12px 12px !important;
    }

    /* ── 6. Preview Aesthetics ─────────────────────── */
    
    [class*="PreviewPane"] article {
      max-width: 100% !important;
      font-family: var(--font-body) !important;
      color: var(--text-primary) !important;
    }

    [class*="PreviewPane"] h1 {
      font-family: var(--font-display) !important;
      font-size: 2.5rem !important;
      font-weight: 700 !important;
      margin-bottom: 1.5rem !important;
      color: #fff !important;
      line-height: 1.1 !important;
    }

    [class*="PreviewPane"] p {
      color: var(--text-secondary) !important;
      line-height: 1.7 !important;
      margin-bottom: 1.25rem !important;
    }

    [class*="PreviewPane"] img {
      width: 100% !important;
      border-radius: 20px !important;
      margin: 2rem 0 !important;
      filter: grayscale(0.2) !important;
    }

    /* ── 7. Buttons & Utilities ────────────────────── */
    
    [class*="Button"],
    [class*="PublishButton"] {
      background: var(--primary) !important;
      color: #05297A !important;
      font-family: var(--font-display) !important;
      font-weight: 700 !important;
      padding: 10px 24px !important;
      border-radius: 10px !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    [class*="PublishButton"]:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 20px rgba(182, 196, 255, 0.2) !important;
      filter: brightness(1.1) !important;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Fix Decap "Card" background bloat */
    [class*="ControlPane"] > div { background-color: transparent !important; }
    [class*="FieldContainer"] { border: none !important; margin-bottom: 24px !important; }
  </style>
</head>
<body>

  <!-- Premium VoidWriter Splash -->
  <div id="cms-loading" role="status" aria-label="Loading VoidWriter Pro">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
    </div>
    <div class="splash-text">
      <span class="splash-title">VoidWriter Pro</span>
      <span class="splash-sub">Antigravity Design System</span>
    </div>
    <div class="splash-spinner"></div>
  </div>

  <!-- Decap CMS Root -->
  <div id="nc-root"></div>

  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>

  <script>
    // Hide splash when CMS renders
    const hideSplash = () => {
      const splash = document.getElementById('cms-loading');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.style.display = 'none', 800);
      }
    };

    const observer = new MutationObserver((mutations, obs) => {
      const root = document.getElementById('nc-root');
      if (root && root.children.length > 0) {
        hideSplash();
        obs.disconnect();
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
    window.addEventListener('load', () => setTimeout(hideSplash, 4000));
  </script>
</body>
</html>
